name: Harvester cluster performance benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      PREFIX: harv-benchmark-wf

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.14.6"
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: Get public IP from the GitHub Runner (security purpose)
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          echo "Detected GitHub Runner IP: $RUNNER_IP"
      - name: Initialize Terraform (Harvester)
        run: terraform init
        working-directory: tests/google-cloud
      - name: Run Terraform apply (Harvester)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          terraform apply -auto-approve \
            -var "prefix=$PREFIX" \
            -var "project_id=$GCP_PROJECT_ID" \
            -var "public_ip_source_addresses=[\"$RUNNER_IP/32\"]"
        working-directory: tests/google-cloud
      - name: Get public IP from Terraform output
        run: |
          ip=$(terraform output -json first_instance_public_ip | jq -r '.[0]')
          echo "HOST_IP=$ip" >> $GITHUB_ENV
          echo "Host IP: $ip"
        working-directory: tests/google-cloud
      - name: Wait for SSH (port 22) to become available
        env:
          HOST_IP: ${{ env.HOST_IP }}
        run: |
          echo "Waiting for port 22 on $HOST_IP..."
          for i in {1..60}; do
            if nc -zv $HOST_IP 22; then
              echo "Port 22 is open."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "SSH not available after 60 attempts."
          exit 1
      - name: Install SSH utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
      - name: Verify host SSH connectivity
        env:
          HOST_IP: ${{ env.HOST_IP }}
        run: |
          ssh \
            -oStrictHostKeyChecking=no \
            -i tests/google-cloud/${PREFIX}-ssh_private_key.pem \
            opensuse@$HOST_IP \
            hostname
      - name: Discover Harvester nested VMs
        env:
          HOST_IP: ${{ env.HOST_IP }}
        run: |
          ssh \
            -oStrictHostKeyChecking=no \
            -i tests/google-cloud/${PREFIX}-ssh_private_key.pem \
            opensuse@$HOST_IP \
            '
              set -e
              rm -f /tmp/nested_nodes.txt
              for VM in $(virsh list --name); do
                virsh domifaddr "$VM" \
                  | awk "/ipv4/ {print \$4}" \
                  | cut -d/ -f1
              done > /tmp/nested_nodes.txt
              cat /tmp/nested_nodes.txt
            ' > nested_nodes.txt
          echo "Discovered nodes:"
          cat nested_nodes.txt
          COUNT=$(wc -l < nested_nodes.txt)
          if [ "$COUNT" -lt 3 ]; then
            echo "Expected 3 Harvester nodes, found $COUNT"
            exit 1
          fi
      - name: Run benchmarks on Harvester nodes
        env:
          HOST_IP: ${{ env.HOST_IP }}
          HARVESTER_PASSWORD: ${{ secrets.HARVESTER_INSTANCES_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p benchmark-results
          run_benchmark() {
            NODE=$1
            echo "========================================"
            echo "Running benchmark on $NODE"
            echo "========================================"
            ssh \
              -oStrictHostKeyChecking=no \
              -i tests/google-cloud/${PREFIX}-ssh_private_key.pem \
              opensuse@$HOST_IP <<EOF
            sshpass -p "$HARVESTER_PASSWORD" \
              ssh \
              -oStrictHostKeyChecking=no \
              rancher@$NODE \
              "bash -s" < tests/performance-analysis/benchmarks.sh
            EOF
          }
          export -f run_benchmark
          export HOST_IP
          export PREFIX
          export HARVESTER_PASSWORD
          cat nested_nodes.txt \
            | xargs -I {} -P 3 bash -c '
                run_benchmark "$1" > benchmark-results/$1.txt 2>&1
              ' _ {}
          ls -lah benchmark-results
      - name: Aggregate benchmark results
        run: |
          rm -f results.txt
          for FILE in benchmark-results/*.txt; do
            NODE=$(basename "$FILE" .txt)

            {
              echo "=================================================="
              echo "NODE: $NODE"
              echo "=================================================="
              echo ""
              cat "$FILE"
              echo ""
              echo ""
            } >> results.txt
          done
          echo "Collected benchmark data"
          wc -l results.txt

