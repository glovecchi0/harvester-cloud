name: Verify Signed-off-by

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify_signed_off_commits:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by trailer
        run: |
          set -e
          BASE_SHA=$(git merge-base origin/${{ github.event.repository.default_branch }} HEAD)
          HEAD_SHA=HEAD
          echo "Checking commits from $BASE_SHA to $HEAD_SHA"
          COMMITS=$(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA")
          for COMMIT in $COMMITS; do
            echo "Checking commit $COMMIT"
            if ! git show -s --format=%B "$COMMIT" | grep -qi "^Signed-off-by:"; then
              echo "ERROR: commit $COMMIT is missing Signed-off-by trailer."
              exit 1
            fi
          done
          echo "All commits contain Signed-off-by trailer."
