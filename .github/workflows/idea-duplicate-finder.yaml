name: Idea Duplicate Finder

on:
  workflow_dispatch:
    inputs:
      issue_number:
        required: false
  issues:
    types: [opened]

jobs:
  analyze-idea:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    env:
      REPO: "rancher/harvester-cloud"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify Gemini API
        run: |
          curl -s \
            -H "x-goog-api-key: ${{ secrets.GEMINI_API_KEY }}" \
            "https://generativelanguage.googleapis.com/v1beta/models"
      # Fetch issue data: title, body, and comments
      - name: Fetch Issue Data
        run: |
          ISSUE=${{ inputs.issue_number || github.event.issue.number }}
          echo "=== Fetching issue $ISSUE from $REPO ==="

          ISSUE_JSON=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE")

          COMMENTS_JSON=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE/comments")

          if ! echo "$ISSUE_JSON" | jq -e '.title' >/dev/null 2>&1; then
            echo "ERROR: Issue $ISSUE not found or access denied!"
            echo "$ISSUE_JSON"
            exit 1
          fi

          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title // empty')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body // empty')
          COMMENTS=$(echo "$COMMENTS_JSON" | jq -r '.[].body // empty')

          echo "=== ISSUE TITLE ===" > issue_data.txt
          echo "$TITLE" >> issue_data.txt
          echo -e "\n=== ISSUE BODY ===" >> issue_data.txt
          echo "$BODY" >> issue_data.txt
          echo -e "\n=== ISSUE COMMENTS ===" >> issue_data.txt
          echo "$COMMENTS" >> issue_data.txt
      # Fetch last ~50 issue titles (paginated)
      - name: Fetch Recent Issue Titles (Paginated)
        run: |
          echo "=== Fetching recent issue titles from $REPO ==="

          MAX_PAGES=50
          ALL_TITLES=""

          for PAGE in $(seq 1 $MAX_PAGES); do
            echo "Fetching page $PAGE..."

            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/$REPO/issues?state=all&per_page=100&page=$PAGE&sort=updated&direction=desc")

            TITLES=$(echo "$RESPONSE" | jq -r '.[].title // empty')

            if [ -z "$TITLES" ]; then
              echo "No more issues found. Stopping."
              break
            fi

            ALL_TITLES="${ALL_TITLES}"$'\n'"${TITLES}"
          done

          {
            echo 'LAST_ISSUE_TITLES<<EOF'
            echo "$ALL_TITLES"
            echo 'EOF'
          } >> "$GITHUB_ENV"
      # Load issue data into environment variable for Gemini
      - name: Load Issue Data to Env
        run: |
          {
            echo 'ISSUE_DATA<<EOF'
            cat issue_data.txt
            echo EOF
          } >> "$GITHUB_ENV"
      # Run Gemini directly via API
      - name: Analyze with Gemini
        id: gemini_analysis
        run: |
          cat > prompt.txt <<'EOF'
          You are analyzing a GitHub issue in the context of the harvester-cloud project.

          About the project:
          - harvester-cloud is a project for deploying Harvester on cloud providers instead of bare-metal infrastructure
          - It is mainly used for labs, testing, and proof-of-concepts (not production)
          - It uses tools like Terraform/OpenTofu and supports providers like AWS, Azure, GCP, DigitalOcean

          Your task:
          - Read and understand the issue content (title, body, comments)
          - Summarize the core problem or idea
          - Check whether a similar issue already exists in this repository
            - Use the provided list of issue titles
            - Look for semantic similarity, not just exact matches
          - If similar issues exist:
            - List them
            - Explain briefly why they are similar
          - If no similar issues are found:
            - Clearly state that this appears to be a new issue

          Keep the answer concise.

          Respond in the following format:

          --- Issue Summary ---
          <Short summary of the issue>

          --- Potential Duplicates ---
          <List similar issue titles or say "None found">

          --- Conclusion ---
          <State whether this is likely a duplicate or a new issue>

          Issue data:
          ---
          ${{ env.ISSUE_DATA }}

          Other issue titles in repo:
          ---
          ${{ env.LAST_ISSUE_TITLES }}
          EOF

          jq -n \
            --rawfile prompt prompt.txt \
            '{
              contents: [
                {
                  parts: [
                    {
                      text: $prompt
                    }
                  ]
                }
              ]
            }' > request.json

          RESPONSE=$(curl -s \
            -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -d @request.json)

          echo "$RESPONSE" > gemini_response.json

          OUTPUT=$(jq -r '.candidates[0].content.parts[0].text // empty' gemini_response.json)

          if [ -z "$OUTPUT" ]; then
            echo "ERROR: Empty response from Gemini"
            cat gemini_response.json
            exit 1
          fi

          {
            echo "output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      # Publish Gemini report to workflow summary
      - name: Publish Report
        if: always()
        run: |
          echo "## Gemini Idea Analysis Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.gemini_analysis.outputs.output }}" >> "$GITHUB_STEP_SUMMARY"
