name: Enhancement
description: Propose a new feature, improvement, or project task
title: "[ENHANCEMENT] "
type: "Task"
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing ideas to improve Harvester Cloud.

        Please describe the proposed enhancement and the problem it aims to solve.

  - type: textarea
    attributes:
      label: Problem Statement
      description: Describe the problem, limitation, or use case that motivates this enhancement.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: Describe the enhancement, feature, or task you would like to see implemented.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or approaches you have considered.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Acceptance Criteria
      description: Describe the expected outcome or criteria that define completion.
      placeholder: |
        - [ ] Implementation completed
        - [ ] Automated tests added or updated
        - [ ] Documentation updated
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any additional context, links, mockups, references, or related issues.
    validations:
      required: false
